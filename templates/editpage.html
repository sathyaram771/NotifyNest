<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
        }

        form {
            text-align: center;
            margin: 20px 0;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #007BFF;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #007BFF;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>EDIT PAGE</h1><br>
    <form action='/finalattendence'>
        <input type="submit" value="Back">
    </form><br>
    
    <form action="/edit" method="post">
        <input type="text" name="name" value="Enter The Name">
        <input type="text" name="roll_no" value="Enter the Roll">
        <input type="text" name="curr_att" value="Enter correct attendance">
        <input type="submit" value="Submit">
    </form><br>
    {{ sregis }}
    <table>
        <thead>
            <tr>
                <th>NAME</th>
                <th>CLASS</th>
                <th>SECTION</th>
                <th>ROLL NO</th>
                <th>ATTENDANCE</th>
            </tr>
        </thead>
        <tbody>
            {% for i in data %}
            <tr>
                <td>{{ i[0] }}</td>
                <td>{{ i[1] }}</td>
                <td>{{ i[2] }}</td>
                <td>{{ i[3] }}</td>
                <td>{{ i[5] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table><br>
</body>
</html>
